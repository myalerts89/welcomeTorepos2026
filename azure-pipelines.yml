# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: TerraformTask@5
  displayName: InitPhase
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendAzureRmUseEntraIdForAuthentication: false
    backendServiceArm: 'Azure subscription 1(7b4fa607-b447-4f15-99df-721b7b10c661)'
    backendAzureRmResourceGroupName: 'terrafor-resource-group'
    backendAzureRmStorageAccountName: 'terraformcloudtfstate'
    backendAzureRmContainerName: 'terraform'
    backendAzureRmKey: 'Prod.terraform.tfstate'
